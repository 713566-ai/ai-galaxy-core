<!DOCTYPE html>
<html>
<head>
    <title>AI Galaxy Core - Master Dashboard</title>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="5">
    <style>
        body { background: #0a0a2a; color: #0f0; font-family: monospace; padding: 20px; }
        h1 { text-align: center; text-shadow: 0 0 10px #0f0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { border: 1px solid #0f0; border-radius: 10px; padding: 15px; background: rgba(0,0,0,0.7); }
        .online { color: #0f0; }
        .offline { color: #f00; }
        .metric { margin: 8px 0; }
        .value { color: #ff0; font-weight: bold; }
        .entropy-bar { background: #333; height: 10px; border-radius: 5px; overflow: hidden; margin: 5px 0; }
        .entropy-fill { background: linear-gradient(90deg, #0f0, #ff0, #f00); height: 100%; width: 0%; }
    </style>
</head>
<body>
    <h1>🚀 AI GALAXY CORE - MASTER DASHBOARD</h1>
    
    <div class="grid">
        <div class="card">
            <h2>🖥️ CORE (3000)</h2>
            <div id="core">Загрузка...</div>
        </div>
        <div class="card">
            <h2>🌌 GOD CORE (5400)</h2>
            <div id="god">Загрузка...</div>
        </div>
        <div class="card">
            <h2>🤖 DEVAGENT (4000)</h2>
            <div id="dev">Загрузка...</div>
        </div>
        <div class="card">
            <h2>🔍 MONITORING (5000)</h2>
            <div id="mon">Загрузка...</div>
        </div>
        <div class="card">
            <h2>🧠 SUPER CORE (7000)</h2>
            <div id="super">Загрузка...</div>
        </div>
        <div class="card">
            <h2>🧬 ЭВОЛЮЦИЯ</h2>
            <div id="evolution">Загрузка...</div>
        </div>
    </div>
    
    <script>
        async function checkPort(url, elementId, name) {
            try {
                const res = await fetch(url, { mode: 'no-cors' });
                document.getElementById(elementId).innerHTML = `<span class="online">✅ ${name} ONLINE</span>`;
            } catch(e) {
                document.getElementById(elementId).innerHTML = `<span class="offline">❌ ${name} OFFLINE</span>`;
            }
        }
        
        async function loadCore() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const tick = data.loop?.tick || 0;
                const rules = data.loop?.rules || {};
                document.getElementById('core').innerHTML = `
                    <div class="metric">🔄 Тик: <span class="value">${tick}</span></div>
                    <div class="metric">🧬 Mutation: ${rules.mutationRate || 0}</div>
                    <div class="metric">⚖️ Selection: ${rules.selectionPressure || 0}</div>
                    <div class="metric">🏃 Состояние: ${data.loop?.running ? '✅ RUNNING' : '⏸️ STOPPED'}</div>
                `;
            } catch(e) {
                document.getElementById('core').innerHTML = '<span class="offline">❌ CORE OFFLINE</span>';
            }
        }
        
        async function loadGod() {
            try {
                const res = await fetch('http://localhost:5400/status');
                const data = await res.json();
                const entropyPercent = (data.entropy * 100).toFixed(1);
                document.getElementById('god').innerHTML = `
                    <div class="metric">🌀 Энтропия: <span class="value">${entropyPercent}%</span></div>
                    <div class="entropy-bar"><div class="entropy-fill" style="width: ${entropyPercent}%"></div></div>
                    <div class="metric">👥 Сущности: <span class="value">${data.entities}</span></div>
                    <div class="metric">⚔️ Войн: ${data.wars}</div>
                    <div class="metric">🤝 Альянсов: ${data.alliances}</div>
                `;
            } catch(e) {
                document.getElementById('god').innerHTML = '<span class="offline">❌ GOD CORE OFFLINE</span>';
            }
        }
        
        async function loadEvolution() {
            try {
                const res = await fetch('/api/memory');
                const data = await res.json();
                const entropy = data.world?.entropy || 0.5;
                const entropyPercent = (entropy * 100).toFixed(1);
                document.getElementById('evolution').innerHTML = `
                    <div class="metric">📊 Тик памяти: ${data.tick || 0}</div>
                    <div class="metric">🌀 Энтропия: ${entropyPercent}%</div>
                    <div class="entropy-bar"><div class="entropy-fill" style="width: ${entropyPercent}%"></div></div>
                    <div class="metric">👥 Сущности: ${data.world?.entities || 0}</div>
                    <div class="metric">⚔️ Войн: ${data.world?.wars || 0}</div>
                `;
            } catch(e) {
                document.getElementById('evolution').innerHTML = '<span class="offline">❌ НЕТ ДАННЫХ</span>';
            }
        }
        
        loadCore();
        loadGod();
        loadEvolution();
        setInterval(() => { loadCore(); loadGod(); loadEvolution(); }, 3000);
    </script>
</body>
</html>
<!-- Добавить в дашборд блок V66 -->
<div class="card">
    <h2>🧠 V66 ADAPTIVE INTELLIGENCE</h2>
    <div id="v66">Загрузка...</div>
</div>

<script>
async function loadV66() {
    try {
        const res = await fetch('/api/v66/state');
        const data = await res.json();
        document.getElementById('v66').innerHTML = `
            <div class="metric">🎯 Policy: MR=${data.policy?.mutationRate?.toFixed(3) || 'N/A'}, SP=${data.policy?.selectionPressure?.toFixed(3) || 'N/A'}</div>
            <div class="metric">📚 Опыт: ${data.experienceSize || 0} шагов</div>
            <div class="metric">🏆 Общая награда: ${data.totalReward || 0}</div>
            <div class="metric">📈 Средняя награда: ${data.averageReward || 0}</div>
            <div class="metric">🔄 Адаптаций: ${data.adaptationCount || 0}</div>
            <div class="metric">⭐ Последняя награда: ${data.lastReward?.toFixed(3) || 0}</div>
        `;
    } catch(e) {
        document.getElementById('v66').innerHTML = '<span class="offline">❌ V66 OFFLINE</span>';
    }
}

// Добавить в setInterval
setInterval(() => { loadV66(); }, 5000);
</script>
