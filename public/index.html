<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Galaxy - Multiverse</title>
    <style>
        body { font-family: monospace; background: #0a0a2a; color: #fff; padding: 20px; }
        h1 { color: #0af; text-align: center; }
        .stats { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .card { background: #1a1a3a; padding: 15px; border-radius: 10px; text-align: center; }
        .value { font-size: 32px; font-weight: bold; color: #0f0; }
        .universe { background: #1a1a3a; margin: 10px; padding: 15px; border-radius: 10px; display: inline-block; width: 300px; }
        .entropy-bar { background: #333; height: 20px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .entropy-fill { background: #f00; height: 100%; transition: width 0.5s; }
        button { background: #00f; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0af; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .status { text-align: center; margin: 20px; color: #0f0; }
    </style>
</head>
<body>
    <h1>🌌 AI GALAXY - МУЛЬТИВСЕЛЕННАЯ V115</h1>
    
    <div class="stats">
        <div class="card"><div>🌍 ВСЕЛЕННЫХ</div><div class="value" id="universeCount">0</div></div>
        <div class="card"><div>🌀 ПОРТАЛОВ</div><div class="value" id="portalCount">0</div></div>
        <div class="card"><div>👑 БОГОВ</div><div class="value" id="godCount">0</div></div>
    </div>
    
    <div id="status" class="status">🔄 ЗАГРУЗКА...</div>
    <div id="grid" class="grid"></div>

    <script>
        async function load() {
            try {
                const res = await fetch('/api/universes');
                const data = await res.json();
                const universes = data.universes || [];
                document.getElementById('universeCount').innerText = universes.length;
                
                const grid = document.getElementById('grid');
                if (universes.length === 0) {
                    grid.innerHTML = '<div style="text-align:center">⚠️ НЕТ ВСЕЛЕННЫХ</div>';
                    return;
                }
                
                grid.innerHTML = universes.map(u => {
                    const entropy = u.entropy || 0;
                    const color = entropy > 0.85 ? '#f00' : (entropy > 0.6 ? '#fa0' : '#0f0');
                    return '<div class="universe">' +
                        '<h3>🌌 ' + (u.id || 'UNKNOWN') + '</h3>' +
                        '<div>📊 ЭНТРОПИЯ: ' + entropy.toFixed(3) + '</div>' +
                        '<div class="entropy-bar"><div class="entropy-fill" style="width:' + (entropy * 100) + '%;background:' + color + '"></div></div>' +
                        '<div>👑 БОГОВ: ' + (u.gods || []).length + '</div>' +
                        '<button onclick="split(\'' + u.id + '\')">🌌 СПЛИТ</button>' +
                        '</div>';
                }).join('');
                
                document.getElementById('status').innerHTML = '✅ ОБНОВЛЕНО: ' + new Date().toLocaleTimeString();
            } catch(e) {
                document.getElementById('status').innerHTML = '❌ ОШИБКА: ' + e.message;
            }
        }
        
        async function split(id) {
            document.getElementById('status').innerHTML = '🔄 СПЛИТ ' + id + '...';
            await fetch('/api/split/' + id, { method: 'POST' });
            setTimeout(load, 1000);
        }
        
        load();
        setInterval(load, 3000);
    </script>
</body>
</html>
