<!DOCTYPE html>
<html>
<head>
    <title>AI Galaxy Core v4.0 - Ultimate Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', monospace;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            padding: 20px;
        }
        .dashboard { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h2 {
            margin-bottom: 15px;
            border-left: 4px solid #4CAF50;
            padding-left: 10px;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #4CAF50;
        }
        .market-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .agent-card {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
        }
        .agent-card:hover { background: rgba(76,175,80,0.3); }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { transform: scale(1.05); transition: 0.2s; }
        .event-banner {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        canvas { max-height: 300px; width: 100%; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🚀 AI GALAXY CORE v4.0</h1>
            <p>Ultimate Evolution Simulator | Factions | Tech Tree | Global Events</p>
        </div>
        
        <div id="eventBanner" style="display: none;" class="event-banner"></div>
        
        <div class="grid">
            <div class="card">
                <h2>📊 Статистика</h2>
                <div id="stats"></div>
            </div>
            <div class="card">
                <h2>💰 Рынок</h2>
                <div id="market"></div>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>📈 Популяция</h2>
                <canvas id="popChart"></canvas>
            </div>
            <div class="card">
                <h2>💎 Богатство</h2>
                <canvas id="wealthChart"></canvas>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>🏆 Топ агентов</h2>
                <div id="topAgents" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
            <div class="card">
                <h2>🎭 Фракции</h2>
                <canvas id="factionChart"></canvas>
            </div>
        </div>
        
        <div class="card">
            <h2>🕹️ Управление</h2>
            <button onclick="saveGame('auto')">💾 Сохранить</button>
            <button onclick="loadGame('auto')">📂 Загрузить</button>
            <button onclick="refreshAll()">🔄 Обновить</button>
            <button onclick="saveGame('manual')">💾 Слот 1</button>
            <button onclick="loadGame('manual')">📂 Слот 1</button>
            <button onclick="showTechTree()">🌳 Технологии</button>
        </div>
    </div>
    
    <script>
        let popChart, wealthChart, factionChart;
        
        async function fetchAPI(endpoint) {
            const res = await fetch(endpoint);
            return await res.json();
        }
        
        async function refreshAll() {
            await Promise.all([loadStats(), loadMarket(), loadTopAgents(), loadFactions(), loadHistory()]);
        }
        
        async function loadStats() {
            const data = await fetchAPI('/api/status');
            document.getElementById('stats').innerHTML = `
                <div class="stat-value">🎮 Поколение ${data.generation}</div>
                <div class="stat-value">⏱️ Шаг ${data.step}</div>
                <div class="stat-value">👥 ${data.population} / ${data.totalAgents}</div>
                <div>💰 Среднее богатство: ${data.stats.avgWealth}</div>
                <div>⚡ Средняя энергия: ${data.stats.avgEnergy}</div>
                <div>🔬 Средний уровень технологий: ${data.stats.avgTech.toFixed(1)}</div>
            `;
            
            const eventBanner = document.getElementById('eventBanner');
            if (data.stats.activeEvent) {
                eventBanner.style.display = 'block';
                eventBanner.innerHTML = `🌍 ГЛОБАЛЬНОЕ СОБЫТИЕ: ${data.stats.activeEvent}`;
            } else {
                eventBanner.style.display = 'none';
            }
        }
        
        async function loadMarket() {
            const data = await fetchAPI('/api/market');
            let html = '';
            for (const [res, info] of Object.entries(data.prices)) {
                const vol = data.volatility[res];
                const color = vol > 0.5 ? '#f44336' : '#4CAF50';
                html += `<div class="market-item">
                    <span>${RESOURCE_ICONS[res] || '💰'} ${res.toUpperCase()}</span>
                    <span style="color: #FFD700;">💰 ${Math.floor(info)}</span>
                    <span style="color: ${color}">📊 ${vol.toFixed(2)}</span>
                </div>`;
            }
            document.getElementById('market').innerHTML = html;
        }
        
        async function loadTopAgents() {
            const data = await fetchAPI('/api/top/wealth');
            let html = '';
            data.agents.slice(0, 10).forEach((agent, i) => {
                html += `<div class="agent-card" onclick="showAgentDetails(${agent.id})">
                    <strong>${i+1}. #${agent.id}</strong> | ${agent.role.toUpperCase()} | ${agent.faction.toUpperCase()}<br>
                    💰 ${agent.wealth} | ⚡ ${agent.energy} | 🔬 ${agent.techs} | 😇 ${agent.karma}
                </div>`;
            });
            document.getElementById('topAgents').innerHTML = html;
        }
        
        async function loadFactions() {
            const data = await fetchAPI('/api/factions');
            if (factionChart) factionChart.destroy();
            const ctx = document.getElementById('factionChart').getContext('2d');
            factionChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(data.factions),
                    datasets: [{
                        data: Object.values(data.factions),
                        backgroundColor: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }
        
        async function loadHistory() {
            const data = await fetchAPI('/api/history');
            
            if (popChart) popChart.destroy();
            const popCtx = document.getElementById('popChart').getContext('2d');
            popChart = new Chart(popCtx, {
                type: 'line',
                data: {
                    labels: data.population.map(p => p.step),
                    datasets: [{
                        label: 'Популяция',
                        data: data.population.map(p => p.value),
                        borderColor: '#4CAF50',
                        backgroundColor: 'rgba(76,175,80,0.1)',
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
            
            if (wealthChart) wealthChart.destroy();
            const wealthCtx = document.getElementById('wealthChart').getContext('2d');
            wealthChart = new Chart(wealthCtx, {
                type: 'line',
                data: {
                    labels: data.avgWealth.map(w => w.step),
                    datasets: [{
                        label: 'Среднее богатство',
                        data: data.avgWealth.map(w => w.value),
                        borderColor: '#FFD700',
                        backgroundColor: 'rgba(255,215,0,0.1)',
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }
        
        async function saveGame(slot) {
            await fetch(`/api/save/${slot}`, { method: 'POST' });
            alert(`💾 Сохранено в слот: ${slot}`);
        }
        
        async function loadGame(slot) {
            const res = await fetch(`/api/load/${slot}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                alert(`📂 Загружено из слота: ${slot}`);
                refreshAll();
            } else {
                alert('❌ Слот не найден');
            }
        }
        
        async function showTechTree() {
            const data = await fetchAPI('/api/techs');
            let msg = '🌳 ТЕХНОЛОГИЧЕСКОЕ ДЕРЕВО 🌳\n\n';
            for (const [tech, count] of Object.entries(data.techs)) {
                msg += `${tech}: ${count} агентов\n`;
            }
            alert(msg);
        }
        
        async function showAgentDetails(id) {
            const data = await fetchAPI('/api/top/wealth');
            const agent = data.agents.find(a => a.id == id);
            if (agent) {
                let inv = '';
                for (const [res, amount] of Object.entries(agent.inventory)) {
                    inv += `${res}: ${Math.floor(amount)}\n`;
                }
                alert(`🤖 АГЕНТ #${agent.id}\n🎭 Роль: ${agent.role}\n👑 Фракция: ${agent.faction}\n💰 Богатство: ${agent.wealth}\n⚡ Энергия: ${agent.energy}\n🔬 Технологий: ${agent.techs}\n😇 Карма: ${agent.karma}\n👥 Союзников: ${agent.allies}\n\n📦 ИНВЕНТАРЬ:\n${inv}`);
            }
        }
        
        const RESOURCE_ICONS = {
            energy: '⚡', minerals: '⛏️', food: '🌾', tech: '🔬', crystals: '💎', uranium: '☢️', antimatter: '✨'
        };
        
        refreshAll();
        setInterval(refreshAll, 3000);
    </script>
</body>
</html>
